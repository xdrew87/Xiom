name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint black isort flake8
      
      - name: Check code formatting with black
        run: black --check xiom.py
        continue-on-error: true
      
      - name: Check import sorting
        run: isort --check-only xiom.py
        continue-on-error: true
      
      - name: Run pylint
        run: pylint xiom.py --fail-under=7.0
        continue-on-error: true
      
      - name: Run flake8
        run: flake8 xiom.py --max-line-length=100
        continue-on-error: true

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12', '3.13']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify tool runs
        run: python3 xiom.py --help
      
      - name: Test with localhost
        run: |
          echo "Testing basic functionality..."
          python3 xiom.py https://example.com --json > /tmp/test_output.json || true
          if [ -f /tmp/test_output.json ]; then
            echo "✓ Tool executed successfully"
          fi

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run bandit security scan
        run: bandit -r xiom.py -f json -o /tmp/bandit-report.json
        continue-on-error: true
      
      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt
        continue-on-error: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify package integrity
        run: |
          python3 -m py_compile xiom.py
          echo "✓ Code compiles successfully"
      
      - name: Display version info
        run: |
          python3 --version
          python3 xiom.py --help | head -5

  notify:
    name: Notify on Completion
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()
    
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "⚠️ Some checks failed. Review the logs above."
          fi
